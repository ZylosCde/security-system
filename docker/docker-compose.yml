name: catalyst-security-demo

services:
  web:
    build:
      context: ..
      dockerfile: docker/files/dev.app.dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        API_BACKEND_URL: ${API_BACKEND_URL:-}
    container_name: catalyst_web
    ports:
      - "${APP_PORT:-3002}:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - API_BACKEND_URL=${API_BACKEND_URL:-}